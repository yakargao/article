<style>
  :root {
    --bg: #0f1117; --card: #1a1d27; --border: #2a2d3a;
    --text: #c9d1d9; --muted: #8b949e; --accent: #58a6ff;
    --green: #3fb950; --orange: #d29922; --red: #f85149;
    --purple: #a371f7; --cyan: #39c5cf;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg); color: var(--text); line-height: 1.6;
    min-height: 100vh;
  }

  /* ── Header ── */
  .header { 
    background: linear-gradient(135deg, #0f1117 0%, #161b22 100%);
    border-bottom: 1px solid var(--border);
    padding: 28px 24px 20px;
    position: sticky; top: 0; z-index: 50;
  }
  .header-inner { max-width: 960px; margin: 0 auto; }
  .header h1 { font-size: 24px; font-weight: 700; color: #fff; display: flex; align-items: center; gap: 10px; }
  .header h1 span { color: var(--accent); }
  .header .sub { font-size: 13px; color: var(--muted); margin-top: 2px; display: flex; gap: 16px; flex-wrap: wrap; }
  .header .sub .stat { color: var(--muted); }
  .header .sub .stat strong { color: var(--text); }

  /* ── Search + Filter bar ── */
  .toolbar { 
    max-width: 960px; margin: 0 auto;
    display: flex; gap: 10px; align-items: center;
    margin-top: 14px;
  }
  .toolbar input {
    flex: 1; padding: 9px 14px; border-radius: 8px;
    background: var(--card); border: 1px solid var(--border); color: var(--text);
    font-size: 13px; outline: none; transition: border-color 0.2s;
  }
  .toolbar input:focus { border-color: var(--accent); }
  .toolbar input::placeholder { color: var(--muted); }

  /* ── Category pills ── */


  /* ── Content area ── */
  .content { max-width: 960px; margin: 0 auto; padding: 20px 24px 60px; }

  /* ── Category section ── */
  .cat-section { margin-bottom: 12px; }
  .cat-header {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px; border-radius: 10px;
    background: var(--card); border: 1px solid var(--border);
    cursor: pointer; transition: all 0.15s;
    user-select: none;
  }
  .cat-header:hover { border-color: var(--accent); }
  .cat-header .name { font-size: 14px; font-weight: 600; color: #e6edf3; flex: 1; }
  .cat-header .count-badge {
    font-size: 11px; background: rgba(255,255,255,0.06);
    padding: 1px 9px; border-radius: 10px; color: var(--muted);
  }
  .cat-header .arrow {
    font-size: 12px; color: var(--muted);
    transition: transform 0.2s;
  }
  .cat-section.open .cat-header .arrow { transform: rotate(90deg); }

  /* ── Articles grid ── */
  .articles { display: none; padding: 6px 0 2px 0; }
  .cat-section.open .articles { display: block; }

  .article-row {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 14px; border-radius: 8px;
    text-decoration: none; color: var(--text);
    transition: background 0.12s;
    border-left: 2px solid transparent;
  }
  .article-row:hover { background: rgba(88,166,255,0.04); border-left-color: var(--accent); }
  .article-row .icon { font-size: 16px; width: 24px; text-align: center; flex-shrink: 0; }
  .article-row .info { flex: 1; min-width: 0; }
  .article-row .title { font-size: 13px; font-weight: 600; color: #e6edf3; }
  .article-row .desc { font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .article-row .tags { display: flex; gap: 4px; flex-shrink: 0; flex-wrap: wrap; }
  .article-row .tag {
    font-size: 10px; padding: 1px 7px; border-radius: 6px;
    font-weight: 500; background: rgba(139,148,158,0.08); color: var(--muted);
  }
  .tag-done { background: rgba(63,185,80,0.10) !important; color: var(--green) !important; }
  .tag-qa { background: rgba(163,113,247,0.10) !important; color: var(--purple) !important; }
  .tag-fig { background: rgba(88,166,255,0.08) !important; color: var(--accent) !important; }

  /* ── Search highlight ── */
  .article-row.hidden { display: none; }
  .cat-section.search-hidden { display: none; }
  .search-empty {
    display: none; text-align: center; padding: 40px 20px;
    color: var(--muted); font-size: 14px;
  }
  .search-empty.visible { display: block; }



  /* ── Footer ── */
  .footer { max-width: 960px; margin: 32px auto; text-align: center; font-size: 12px; color: var(--muted); }

  /* ── Responsive ── */
  @media (max-width: 768px) {
    .header { padding: 16px 12px 14px; }
    .header h1 { font-size: 19px; }
    .header .sub { font-size: 12px; gap: 10px; }
    .toolbar { flex-direction: row; gap: 8px; margin-top: 10px; }
    .toolbar input { padding: 7px 10px; font-size: 12px; }

    .content { padding: 12px 12px 40px; }
    .cat-header { padding: 8px 12px; }
    .cat-header .name { font-size: 13px; }
    .article-row { padding: 6px 10px; gap: 8px; }
    .article-row .desc { display: none; }
    .article-row .title { font-size: 12px; }
    .article-row .tag { font-size: 9px; padding: 0 5px; }
  }
  @media (max-width: 480px) {
    .article-row .tags { gap: 2px; }
    .article-row .tag { display: none; }
    .article-row .tag:first-child { display: inline-block; }
  }
</style>

// ── Render ──
function render() {
  const container = document.getElementById('content');
  container.innerHTML = '';
  SECTIONS.forEach((sec, idx) => {
    const div = document.createElement('div');
    div.className = 'cat-section';
    div.id = 'sec-' + sec.id;
    div.dataset.category = sec.id;

    let html = `<div class="cat-header" onclick="toggleSection('${sec.id}')">
      <span class="name">${sec.name}</span>
      <span class="count-badge">${sec.count} 篇</span>
      <span class="arrow">▸</span>
    </div><div class="articles">`;

    sec.articles.forEach(a => {
      const tagHtml = a.tags.slice(0, 3).map(t => {
        let cls = 'tag';
        if (t.includes('已完成')) cls += ' tag-done';
        else if (t.includes('苏格拉底') || t.includes('实战')) cls += ' tag-qa';
        return `<span class="${cls}">${t}</span>`;
      }).join('');
      html += `<a href="/${a.href}" class="article-row" data-search="${a.title} ${a.desc}">
        <span class="icon">${a.icon}</span>
        <span class="info">
          <span class="title">${a.title}</span>
          <span class="desc">${a.desc}</span>
        </span>
        <span class="tags">${tagHtml}</span>
      </a>`;
    });

    html += '</div>';
    div.innerHTML = html;
    container.appendChild(div);
  });
}



// ── Section toggle ──
function toggleSection(id) {
  const el = document.getElementById('sec-' + id);
  el.classList.toggle('open');
}

// ── Search ──
function filterArticles() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  const allArticles = document.querySelectorAll('.article-row');
  const allSections = document.querySelectorAll('.cat-section');
  const empty = document.querySelector('.search-empty') || (() => {
    const e = document.createElement('div');
    e.className = 'search-empty';
    e.id = 'searchEmpty';
    e.textContent = '🔍 没有找到匹配的文章';
    document.getElementById('content').appendChild(e);
    return e;
  })();

  if (!q) {
    allArticles.forEach(a => a.classList.remove('hidden'));
    allSections.forEach(s => s.classList.remove('search-hidden'));
    empty.classList.remove('visible');
    // Restore active category
    const activePill = document.querySelector('.pill.active');
    if (activePill) switchCategory(activePill.dataset.cat);
    return;
  }

  let visibleCount = 0;
  allArticles.forEach(a => {
    const haystack = (a.dataset.search || '').toLowerCase();
    const match = haystack.includes(q);
    a.classList.toggle('hidden', !match);
    if (match) visibleCount++;
  });

  allSections.forEach(s => {
    const hasVisible = [...s.querySelectorAll('.article-row')].some(a => !a.classList.contains('hidden'));
    s.classList.toggle('search-hidden', !hasVisible);
    if (hasVisible) s.classList.add('open');
  });

  empty.classList.toggle('visible', visibleCount === 0);
}



// ── Init ──
document.addEventListener('DOMContentLoaded', () => {
  render();
  // Scroll to section if URL has hash
  const hash = location.hash.replace('#', '');
  if (hash) {
    setTimeout(() => {
      const el = document.getElementById('sec-' + hash);
      if (el) { el.classList.add('open'); el.scrollIntoView({ behavior: 'smooth', block: 'start' }); }
    }, 200);
  }
});
</script>
